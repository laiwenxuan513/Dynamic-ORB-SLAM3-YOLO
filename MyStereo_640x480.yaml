%YAML:1.0

File.version: "1.0"

#--------------------------------------------------------------------------------------------
# Camera Parameters
#--------------------------------------------------------------------------------------------

Camera.type: "PinHole"

# Rectified parameters from stereo calibration P matrix
Camera.fx: 629.0947625734735
Camera.fy: 629.0947625734735
Camera.cx: 181.05555534362793
Camera.cy: 238.4998321533203

# If input images are rectified, distortion should be 0
Camera.k1: 0.0
Camera.k2: 0.0
Camera.p1: 0.0
Camera.p2: 0.0

Camera.width: 640
Camera.height: 480

Camera.fps: 30.0

# bf = abs(P_right[0,3])
Camera.bf: 37.34883898860862

# You publish mono8 images, so RGB = 0
Camera.RGB: 0

#--------------------------------------------------------------------------------------------
# Stereo Parameters
#--------------------------------------------------------------------------------------------

ThDepth: 40.0

#--------------------------------------------------------------------------------------------
# ORB Parameters
#--------------------------------------------------------------------------------------------

ORBextractor.nFeatures: 1200
ORBextractor.scaleFactor: 1.2
ORBextractor.nLevels: 8
ORBextractor.iniThFAST: 20
ORBextractor.minThFAST: 7

#--------------------------------------------------------------------------------------------
# Viewer Parameters
#--------------------------------------------------------------------------------------------

Viewer.KeyFrameSize: 0.05
Viewer.KeyFrameLineWidth: 1.0
Viewer.GraphLineWidth: 0.9
Viewer.PointSize: 2.0
Viewer.CameraSize: 0.08
Viewer.CameraLineWidth: 3.0
Viewer.ViewpointX: 0.0
Viewer.ViewpointY: -0.7
Viewer.ViewpointZ: -1.8
Viewer.ViewpointF: 500.0

